<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strallo</title>
    <link rel="stylesheet" href="./src/global/strallo.css">
    <link rel="stylesheet" href="./src/global/global.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

    <main>
        <div class="apresentation-container">
            <div class="apresentation">
                <img class="logo" src="assets/ico/Strallo (logo symbol) (upscale).png" alt="Logo da Strallo">
            </div>
        </div>

        <div class="login-container">
            <div class="login-background">
                <div class="login">
                    <input class="input" type="email" placeholder="Digite seu email">
                    <input class="input" type="password" placeholder="Digite sua senha">
                    <button>Entrar</button>
                    <button>Cadastre-se</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Strallo</title>
        <link rel="stylesheet" href="./authglobal.css">
        <link rel="shortcut icon" href="../../assets/ico/favicon.ico"
            type="image/x-icon">
    </head>
    <body>

        <main>
            <div class="auth-page-container">
                <img class="auth-image-panel"
                    src="../../assets/images/macos-monterey-stock-orange-light-layers-5k-6016x6016-5894.webp"
                    alt="imagem de fundo de login">
                <div class="auth-form">
                    <img class="auth-logo"
                        src="../../assets/ico/Strallo (logo symbol) (upscale).png"
                        alt="logotipo">
                    <h1>Sejamos gratos por sua vinda</h1>
                    <h2>Voltando a arrumar a bagunça</h2>
                    <div class="auth-input-group">
                        <div class="auth-field-label">
                            <p>E-mail</p>
                            <img
                                src="../../assets/icons/alternate_email_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
                                alt="icone de email">
                        </div>
                        <input type="E-mail" placeholder="Seu melhor E-mail">
                        <div class="auth-password-field">
                            <p>Senha</p>
                            <img
                                src="../../assets/icons/password_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
                                alt="icone de senha">
                        </div>
                        <input type="password"
                            placeholder="Uma coisa inesquecivel">
                    </div>
                    <button>Entrar</button>
                    <p>É novo por aqui? <a
                            href="./register.html">Cadastre-se</a></p>
                    <div class="auth-divider">
                        <hr>
                        <p>Ou</p>
                        <hr>
                    </div>
                    <div class="auth-social-buttons">
                        <button class="auth-social-button-google"> <img
                                src="../../assets/icons/google-logo.png"
                                alt="logotipo do google"> Google </button>
                        <button class="auth-social-button-facebook"> <img
                                src="../../assets/icons/2023_Facebook_icon.svg.png"
                                alt="logotipo de facebook">Facebook</button>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
